# =============================================================================
# mihomo (Clash.Meta) - Production Configuration
# Mode: RULE-SET with MetaCubeX MRS rule-providers
# Features: TUN (mixed stack), fake-ip DNS, YAML anchors, regional groups
# =============================================================================

# --- Inbound Ports -----------------------------------------------------------
mixed-port: 7890           # HTTP + SOCKS5 combined port
# port: 7891               # HTTP-only (optional)
# socks-port: 7892         # SOCKS5-only (optional)

# --- General Settings --------------------------------------------------------
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: true
unified-delay: false
tcp-concurrent: true
find-process-mode: strict
keep-alive-interval: 15

# --- External Control (API & Web UI) ----------------------------------------
external-controller: 127.0.0.1:9090
# secret: ""
external-ui: ui
external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"

# --- Persistence -------------------------------------------------------------
profile:
  store-selected: true     # remember proxy group selections
  store-fake-ip: true      # persist fake-ip mapping table

# --- Domain Sniffing ---------------------------------------------------------
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# --- TUN Mode ----------------------------------------------------------------
tun:
  enable: true
  stack: mixed             # tcp=system, udp=gvisor
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true      # Linux only; ignored on macOS/Windows
  auto-detect-interface: true

# --- DNS Configuration -------------------------------------------------------
dns:
  enable: true
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*"                  # match bare names (no dot) like localhost
    - "+.lan"
    - "+.local"
    - "+.market.xiaomi.com"
  default-nameserver:      # bootstrap: resolve DoH/DoT server names
    - tls://223.5.5.5
    - tls://223.6.6.6
  nameserver:
    - "https://doh.pub/dns-query"
    - "https://dns.alidns.com/dns-query"

# =============================================================================
# YAML Anchors
# =============================================================================

# --- Proxy-provider anchor ---------------------------------------------------
# Shared settings for subscription providers (update every hour, health-check
# every 5 minutes)
p: &p
  type: http
  interval: 3600
  health-check:
    enable: true
    url: "https://www.gstatic.com/generate_204"
    interval: 300

# --- Rule-provider anchors ---------------------------------------------------
rule-anchor:
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}

# =============================================================================
# Proxies & Proxy Providers
# =============================================================================

proxies:
  - name: "直连"
    type: direct
    udp: true

# Fill in your subscription URLs below. Names must be unique.
proxy-providers:
  provider1:
    <<: *p
    url: "https://your-subscription-url-1"
    override:
      additional-prefix: "[provider1]"

  provider2:
    <<: *p
    url: "https://your-subscription-url-2"
    override:
      additional-prefix: "[provider2]"

# =============================================================================
# Proxy Groups
# =============================================================================

proxy-groups:

  # --- Main policy group -----------------------------------------------------
  - name: 默认
    type: select
    proxies: [自动选择, 直连, 香港, 台湾, 日本, 新加坡, 美国, 其它地区, 全部节点]

  # --- Service-specific routing groups ---------------------------------------
  - name: Google
    type: select
    proxies: [默认, 香港, 台湾, 日本, 新加坡, 美国, 其它地区, 全部节点, 自动选择, 直连]

  - name: Telegram
    type: select
    proxies: [默认, 香港, 台湾, 日本, 新加坡, 美国, 其它地区, 全部节点, 自动选择, 直连]

  - name: YouTube
    type: select
    proxies: [默认, 香港, 台湾, 日本, 新加坡, 美国, 其它地区, 全部节点, 自动选择, 直连]

  - name: NETFLIX
    type: select
    proxies: [默认, 香港, 台湾, 日本, 新加坡, 美国, 其它地区, 全部节点, 自动选择, 直连]

  - name: Spotify
    type: select
    proxies: [默认, 香港, 台湾, 日本, 新加坡, 美国, 其它地区, 全部节点, 自动选择, 直连]

  - name: Github
    type: select
    proxies: [默认, 香港, 台湾, 日本, 新加坡, 美国, 其它地区, 全部节点, 自动选择, 直连]

  - name: 国内
    type: select
    proxies: [直连, 默认, 香港, 台湾, 日本, 新加坡, 美国, 其它地区, 全部节点, 自动选择]

  - name: 其他
    type: select
    proxies: [默认, 香港, 台湾, 日本, 新加坡, 美国, 其它地区, 全部节点, 自动选择, 直连]

  # --- Regional groups (auto-populated via include-all + filter) -------------
  - name: 香港
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)港|hk|hongkong|hong kong"

  - name: 台湾
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)台|tw|taiwan"

  - name: 日本
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)日|jp|japan"

  - name: 美国
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)美|us|unitedstates|united states"

  - name: 新加坡
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)(新|sg|singapore)"

  - name: 其它地区
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)^(?!.*(?:🇭🇰|🇯🇵|🇺🇸|🇸🇬|🇨🇳|港|hk|hongkong|台|tw|taiwan|日|jp|japan|新|sg|singapore|美|us|unitedstates)).*"

  - name: 全部节点
    type: select
    include-all: true
    exclude-type: direct

  - name: 自动选择
    type: url-test
    include-all: true
    exclude-type: direct
    tolerance: 10

# =============================================================================
# Rules
# =============================================================================

rules:
  # Private / LAN traffic -> direct
  - RULE-SET,private_domain,直连
  - RULE-SET,private_ip,直连,no-resolve

  # Service-specific domain rules
  - RULE-SET,github_domain,Github
  - RULE-SET,youtube_domain,YouTube
  - RULE-SET,google_domain,Google
  - RULE-SET,telegram_domain,Telegram
  - RULE-SET,netflix_domain,NETFLIX
  - RULE-SET,spotify_domain,Spotify

  # China-specific
  - RULE-SET,cn_domain,国内

  # Non-CN catch-all domain rule
  - RULE-SET,geolocation-!cn,其他

  # IP-based rules (evaluated after domain rules)
  - RULE-SET,google_ip,Google
  - RULE-SET,netflix_ip,NETFLIX
  - RULE-SET,telegram_ip,Telegram
  - RULE-SET,cn_ip,国内

  # Final catch-all (must be last)
  - MATCH,其他

# =============================================================================
# Rule Providers (MetaCubeX MRS format)
# =============================================================================

rule-providers:
  # --- Domain providers ------------------------------------------------------
  private_domain:
    <<: *domain
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs"

  cn_domain:
    <<: *domain
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cn.mrs"

  github_domain:
    <<: *domain
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/github.mrs"

  youtube_domain:
    <<: *domain
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/youtube.mrs"

  google_domain:
    <<: *domain
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/google.mrs"

  telegram_domain:
    <<: *domain
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/telegram.mrs"

  netflix_domain:
    <<: *domain
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/netflix.mrs"

  spotify_domain:
    <<: *domain
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/spotify.mrs"

  geolocation-!cn:
    <<: *domain
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/geolocation-!cn.mrs"

  # --- IP providers ----------------------------------------------------------
  private_ip:
    <<: *ip
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/private.mrs"

  cn_ip:
    <<: *ip
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.mrs"

  google_ip:
    <<: *ip
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/google.mrs"

  netflix_ip:
    <<: *ip
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/netflix.mrs"

  telegram_ip:
    <<: *ip
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/telegram.mrs"
